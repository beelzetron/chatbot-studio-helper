image: registry.access.redhat.com/ubi9/python-312:latest

variables:
  GITLAB_REGISTRY: "registry.gitlab.labbase.it"
  BACKEND_PROJECT: "home-lab/chatbot-studio-helper"
  FRONTEND_PROJECT: "home-lab/chatbot-studio-helper-frontend"
  PYTHONPATH: "."

stages:
  - test
  - build
  - deploy

# Backend Tests
test-backend:
  stage: test
  script:
    - pip install -r requirements.txt -r requirements-dev.txt
    - pytest tests/ -v
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - requirements.txt
        - requirements-dev.txt

# Frontend Tests
test-frontend:
  stage: test
  image: registry.access.redhat.com/ubi9/nodejs-20:latest
  script:
    - cd frontend
    - npm ci
    - npm run test -- --run
  rules:
    - changes:
        - frontend/**/*

# Code Quality
code-quality:
  stage: test
  image: registry.access.redhat.com/ubi9/python-312:latest
  script:
    - pip install -r requirements.txt -r requirements-dev.txt
    - pip-audit -r requirements.txt
    - flake8 src/ tests/
    - black --check src/
    - isort --check-only src/
    - mypy src/
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - requirements.txt
        - requirements-dev.txt
        - .flake8
        - mypy.ini

# Build Backend Image (manual trigger)
build-backend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - |
      echo "Building backend Docker image (UBI9)..."
      docker build -t $GITLAB_REGISTRY/$BACKEND_PROJECT:latest .
      docker tag $GITLAB_REGISTRY/$BACKEND_PROJECT:latest $GITLAB_REGISTRY/$BACKEND_PROJECT:$CI_COMMIT_SHORT_SHA
    - |
      echo "Pushing backend to GitLab Registry..."
      docker push $GITLAB_REGISTRY/$BACKEND_PROJECT:latest
      docker push $GITLAB_REGISTRY/$BACKEND_PROJECT:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true

# Build Frontend Image (manual trigger)
build-frontend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - |
      echo "Building frontend Docker image (UBI9)..."
      docker build -t $GITLAB_REGISTRY/$FRONTEND_PROJECT:latest ./frontend
      docker tag $GITLAB_REGISTRY/$FRONTEND_PROJECT:latest $GITLAB_REGISTRY/$FRONTEND_PROJECT:$CI_COMMIT_SHORT_SHA
    - |
      echo "Pushing frontend to GitLab Registry..."
      docker push $GITLAB_REGISTRY/$FRONTEND_PROJECT:latest
      docker push $GITLAB_REGISTRY/$FRONTEND_PROJECT:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true

# Deploy to OpenShift (manual trigger)
deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to OpenShift..."
    - oc login --token=$OPENSHIFT_TOKEN --server=$OPENSHIFT_SERVER
    - oc apply -f k8s/ -n homework-bot
    - oc rollout status deployment/study-helper-chatbot -n homework-bot
    - oc rollout status deployment/study-helper-frontend -n homework-bot
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true
