---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-helper-frontend
  namespace: homework-bot
  labels:
    app: study-helper-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: study-helper-frontend
  template:
    metadata:
      labels:
        app: study-helper-frontend
    spec:
      containers:
      - name: frontend
        image: registry.gitlab.labbase.it/home-lab/chatbot-studio-helper-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: study-helper-frontend
  namespace: homework-bot
spec:
  selector:
    app: study-helper-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: study-helper-frontend
  namespace: homework-bot
spec:
  to:
    kind: Service
    name: study-helper-frontend
  port:
    targetPort: 80
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
