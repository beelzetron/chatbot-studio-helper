name: Test

on:
  workflow_call:

jobs:
  lint-internal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for internal network references
        run: |
          PATTERN='192\.168\.\d{1,3}\.\d{1,3}|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2[0-9]|3[01])\.\d{1,3}\.\d{1,3}|labbase\.it|gitlab\.labbase'
          if rg -n "$PATTERN" \
            --glob '!package-lock.json' \
            --glob '!**/package.json' \
            --glob '!.github/**' .; then
            echo "Internal network references found in tracked files."
            exit 1
          fi
          echo "No internal network references found."

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run backend tests
        run: PYTHONPATH=. pytest tests/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm run test -- --run

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pip-audit
        run: pip-audit -r requirements.txt
      - name: flake8
        run: flake8 src/ tests/
      - name: black
        run: black --check src/
      - name: isort
        run: isort --check-only src/
      - name: mypy
        run: mypy src/
